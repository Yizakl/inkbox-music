name: Build Tauri App (For TrollStore)

on:
  workflow_dispatch:
    inputs:
      build_target:
        description: '請選擇要編譯的平台'
        required: true
        default: 'both'
        type: choice
        options:
          - 'both'
          - 'android'
          - 'ios'

jobs:
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          if [ "${{ github.event.inputs.build_target }}" = "android" ]; then
            echo 'matrix={"include":[{"platform":"ubuntu-latest","target":"android"}]}' >> $GITHUB_OUTPUT
          elif [ "${{ github.event.inputs.build_target }}" = "ios" ]; then
            echo 'matrix={"include":[{"platform":"macos-latest","target":"ios"}]}' >> $GITHUB_OUTPUT
          else
            echo 'matrix={"include":[{"platform":"ubuntu-latest","target":"android"},{"platform":"macos-latest","target":"ios"}]}' >> $GITHUB_OUTPUT
          fi

  build:
    needs: setup-matrix
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup-matrix.outputs.matrix) }}

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. 初始化 Node.js 環境
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 2. 安裝前端依賴
      - name: Install frontend dependencies
        run: npm install

      # 3. 初始化 Rust 環境
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target == 'android' && 'aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android' || 'aarch64-apple-ios' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      # 4. Android 專屬配置
      - name: Setup Java (Android only)
        if: matrix.target == 'android'
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK (Android only)
        if: matrix.target == 'android'
        uses: android-actions/setup-android@v3

      # 5. 安裝 Tauri CLI
      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Android Pre-requisites
        if: matrix.target == 'android'
        run: npx tauri android init

      - name: iOS Pre-requisites
        if: matrix.target == 'ios'
        run: npx tauri ios init

      # 6. 執行構建
      - name: Build Android APK
        if: matrix.target == 'android'
        run: npx tauri android build --apk

      # iOS 核心修改：強制真機架構 (iphoneos)，並徹底關閉代碼簽名驗證
      - name: Build Unsigned iOS App for Real Device
        if: matrix.target == 'ios'
        run: |
          npx tauri ios build -- \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            IPHONEOS_DEPLOYMENT_TARGET=16.4

      # 特殊步驟：為 TrollStore 製作標準 .ipa 包
      - name: Package IPA for TrollStore
        if: matrix.target == 'ios'
        run: |
          cd src-tauri/gen/apple/build/arm64
          mkdir -p Payload
          # 找到編譯出來的 .app 並複製到 Payload 目錄中
          cp -r *.app Payload/
          # 打包成 ipa
          zip -r tauri-app-trollstore.ipa Payload
          echo "TrollStore IPA 打包完成！"

      # 7. 上傳構建產物
      - name: Upload Android Artifacts
        if: matrix.target == 'android'
        uses: actions/upload-artifact@v4
        with:
          name: tauri-apk
          path: src-tauri/gen/android/**/*.apk

      # 上傳製做好的 .ipa 檔案
      - name: Upload iOS TrollStore IPA
        if: matrix.target == 'ios'
        uses: actions/upload-artifact@v4
        with:
          name: tauri-ios-trollstore-ipa
          path: src-tauri/gen/apple/build/arm64/*.ipa
